target-version = "py310"
src = ["python"]
extend-exclude = [
  "python/api",
  "python/buf",
  "python/.venv",
]

[lint]
select = ["ALL"]
ignore = [
  # Conflicts with the Ruff formatter.
  "COM812",
  "ISC001",
  # Pick one docstring convention (Google-style / D211 + D212).
  "D203", # incorrect-blank-line-before-class (conflicts with D211)
  "D213", # multi-line-summary-second-line (conflicts with D212)
]

[lint.isort]
known-first-party = ["python"]

[lint.pydocstyle]
convention = "google"

[lint.per-file-ignores]
# Generated by `buf generate --template buf.gen.python.yaml`.
"python/__init__.py" = ["D104"]

[format]
docstring-code-format = true
