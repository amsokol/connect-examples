# PR gate via Cursor Agent SDK (agent-gate / pr_gate).
# Thin job + run-product-agent-gate composite (keeps check name
# "Agent gate (PR review)" for the branch ruleset).

name: agent-gate

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      mode:
        description: "dry-run (plan only) or ship (post review / APPROVE)"
        required: true
        type: choice
        options:
          - dry-run
          - ship
        default: dry-run
      pr:
        description: "Pull request number"
        required: true
        type: string

concurrency:
  group: >-
    agent-gate-pr-${{
      github.event.pull_request.number ||
      github.event.issue.number ||
      inputs.pr
    }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  agent-gate:
    name: Agent gate (PR review)
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository
      ) ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        github.event.comment.user.type != 'Bot'
      ) ||
      (
        github.event_name == 'pull_request_review_comment' &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        github.event.comment.user.type != 'Bot'
      )
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    env:
      CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
      AGENT_GATE_MODEL: ${{ vars.AGENT_GATE_MODEL || vars.CURSOR_AGENT_MODEL || vars.CURSOR_REV_MODEL || vars.CURSOR_VUL_MODEL || vars.CURSOR_DEP_MODEL }}
      AGENT_SCM: github
      GH_TOKEN: ${{ github.token }}
      AGENT_GATE_GH_TOKEN: ${{ secrets.AGENT_GATE_GH_TOKEN || secrets.AGENT_GH_TOKEN }}
    steps:
      - name: Run product agent-gate
        uses: amsokol/ai-devsecops-cursor/.github/actions/run-product-agent-gate@v0.3.7
        with:
          target_id: connect-examples
          mode: ${{ github.event_name == 'workflow_dispatch' && inputs.mode || 'ship' }}
          pr: ${{ inputs.pr || '' }}
