# PR gate — thin product wrapper + run-product-agent-gate@v0.3.15
# Job name "Agent gate (PR review)" must stay exact (ruleset required check).
# Comments / off-ref workflow_dispatch re-dispatch onto the PR head branch so
# the required check attaches to the PR head SHA (not main).

name: agent-gate

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      mode:
        description: "dry-run (plan only) or ship (post review / APPROVE)"
        required: true
        type: choice
        options:
          - dry-run
          - ship
        default: dry-run
      pr:
        description: "Pull request number"
        required: true
        type: string

concurrency:
  group: >-
    agent-gate-pr-${{
      github.event.pull_request.number ||
      github.event.issue.number ||
      inputs.pr
    }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  actions: write

jobs:
  plan:
    name: Agent gate plan
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        github.event.comment.user.type != 'Bot'
      ) ||
      (
        github.event_name == 'pull_request_review_comment' &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        github.event.comment.user.type != 'Bot'
      )
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      should_dispatch: ${{ steps.decide.outputs.should_dispatch }}
      should_gate: ${{ steps.decide.outputs.should_gate }}
      pr: ${{ steps.decide.outputs.pr }}
      head_ref: ${{ steps.decide.outputs.head_ref }}
      mode: ${{ steps.decide.outputs.mode }}
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Decide dispatch vs gate
        id: decide
        run: |
          set -euo pipefail
          case "${{ github.event_name }}" in
            workflow_dispatch)
              PR="${{ inputs.pr }}"
              MODE="${{ inputs.mode }}"
              ;;
            pull_request_review_comment)
              PR="${{ github.event.pull_request.number }}"
              MODE="ship"
              ;;
            issue_comment)
              PR="${{ github.event.issue.number }}"
              MODE="ship"
              ;;
            *)
              echo "::error::Unsupported event for plan: ${{ github.event_name }}"
              exit 1
              ;;
          esac
          if [ -z "${PR}" ]; then
            echo "::error::Missing PR number"
            exit 1
          fi

          HEAD_REF="$(gh pr view "$PR" --repo "${{ github.repository }}" \
            --json headRefName --jq .headRefName)"
          HEAD_OID="$(gh pr view "$PR" --repo "${{ github.repository }}" \
            --json headRefOid --jq .headRefOid)"
          HEAD_REPO="$(gh pr view "$PR" --repo "${{ github.repository }}" \
            --json headRepository --jq .headRepository.nameWithOwner)"

          if [ "$HEAD_REPO" != "${{ github.repository }}" ]; then
            echo "::error::Refusing agent-gate on fork PR head ($HEAD_REPO)"
            exit 1
          fi

          SHOULD_DISPATCH="false"
          SHOULD_GATE="false"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && \
             [ "${{ github.sha }}" = "$HEAD_OID" ]; then
            SHOULD_GATE="true"
          else
            SHOULD_DISPATCH="true"
          fi

          {
            echo "pr=${PR}"
            echo "head_ref=${HEAD_REF}"
            echo "mode=${MODE}"
            echo "should_dispatch=${SHOULD_DISPATCH}"
            echo "should_gate=${SHOULD_GATE}"
          } >> "$GITHUB_OUTPUT"
          echo "pr=${PR} head_ref=${HEAD_REF} head_oid=${HEAD_OID} sha=${{ github.sha }} dispatch=${SHOULD_DISPATCH} gate=${SHOULD_GATE}"

  retrigger:
    name: Agent gate retrigger
    needs: plan
    if: needs.plan.outputs.should_dispatch == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      actions: write
      contents: read
      pull-requests: read
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Dispatch agent-gate on PR head ref
        run: |
          set -euo pipefail
          PR="${{ needs.plan.outputs.pr }}"
          REF="${{ needs.plan.outputs.head_ref }}"
          MODE="${{ needs.plan.outputs.mode }}"
          echo "Dispatching agent-gate.yml --ref ${REF} -f mode=${MODE} -f pr=${PR}"
          gh workflow run agent-gate.yml \
            --repo "${{ github.repository }}" \
            --ref "$REF" \
            -f "mode=${MODE}" \
            -f "pr=${PR}"

  agent-gate:
    name: Agent gate (PR review)
    needs: plan
    if: >
      always() &&
      (
        (
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository
        ) ||
        (
          needs.plan.result == 'success' &&
          needs.plan.outputs.should_gate == 'true'
        )
      )
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    env:
      CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
      AGENT_GATE_MODEL: ${{ vars.AGENT_GATE_MODEL || vars.CURSOR_AGENT_MODEL || vars.CURSOR_REV_MODEL || vars.CURSOR_VUL_MODEL || vars.CURSOR_DEP_MODEL }}
      AGENT_SCM: github
      GH_TOKEN: ${{ github.token }}
      AGENT_GATE_GH_TOKEN: ${{ secrets.AGENT_GATE_GH_TOKEN || secrets.AGENT_GH_TOKEN }}
    steps:
      - name: Run product agent-gate
        uses: amsokol/ai-devsecops-cursor/.github/actions/run-product-agent-gate@v0.3.15
        with:
          target_id: connect-examples
          mode: ${{ github.event_name == 'workflow_dispatch' && inputs.mode || 'ship' }}
          pr: ${{ inputs.pr || github.event.pull_request.number || '' }}
