name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  bazel:
    name: Bazel (build, test)
    runs-on: ubuntu-latest
    container:
      image: eclipse-temurin:25-jdk
    steps:
      - name: Install Bazelisk
        run: |
          set -euo pipefail
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            curl \
            git \
            unzip \
            zip
          curl -fsSL -o /usr/local/bin/bazel \
            "https://github.com/bazelbuild/bazelisk/releases/download/${BAZELISK_VERSION}/bazelisk-linux-amd64"
          chmod +x /usr/local/bin/bazel
          bazel version
        env:
          BAZELISK_VERSION: "v1.29.0"

      - name: Check out repository
        uses: actions/checkout@v7

      # Do not `bazel run //api/v1:generate` here — that rewrites stubs and hides
      # drift. //api/v1:generate_*_test (via bazel test //...) fails if checked-in
      # Go/Python stubs are out of date; regenerate locally and commit instead.

      - name: Build
        run: |
          bazel build //...

      - name: Test
        run: bazel test //...

  native:
    name: Native (Go, Python, Rust)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Download modules and install Go tools
        run: |
          set -euo pipefail
          go mod download
          # Installs buf (and other tools) to GOPATH/bin for PATH consumers such as rust/echo/build.rs.
          go install tool

      - name: Lint Protobuf
        run: go tool buf lint --error-format=github-actions

      - name: Check generated code is up to date
        run: |
          set -euo pipefail
          go tool buf generate --template buf.gen.go.yaml
          go tool buf generate --template buf.gen.python.yaml --include-imports
          # Match bazel buf_generate: py plugins omit package markers.
          find python/gen -type d -print0 | while IFS= read -r -d "" d; do
            if [[ ! -f "$d/__init__.py" ]]; then
              printf '%s\n' 'from __future__ import annotations' > "$d/__init__.py"
            fi
          done
          if ! git diff --exit-code -- go/api; then
            echo "::error::Generated Go code is out of date. Run 'go tool buf generate --template buf.gen.go.yaml' (or 'bazel run //api/v1:generate') and commit the result."
            exit 1
          fi
          if ! git diff --exit-code -- python/gen; then
            echo "::error::Generated Python code is out of date. Run 'go tool buf generate --template buf.gen.python.yaml --include-imports' (or 'bazel run //api/v1:generate') and commit the result."
            exit 1
          fi

      - name: Build
        run: go build ./...

      - name: Build and lint Rust
        run: |
          set -euo pipefail
          cargo clippy --locked -- -D warnings
          cargo test --locked -p echo-server

      - name: Lint Go
        run: go tool golangci-lint run --issues-exit-code=1 ./...

      - name: Lint Python
        run: |
          set -euo pipefail
          python -m pip install -r requirements-dev.txt
          ruff check python
          ruff format --check python/echo

      - name: Vulnerability check
        run: |
          set -euo pipefail
          go tool govulncheck ./...
          pip-audit -r requirements.txt -r requirements-dev.txt

      - name: Test
        run: go test ./...
