name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  bazel:
    name: Bazel (build, test)
    runs-on: ubuntu-latest
    container:
      image: eclipse-temurin:25-jdk
    steps:
      - name: Install Bazelisk
        run: |
          set -euo pipefail
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            curl \
            git \
            unzip \
            zip
          curl -fsSL -o /usr/local/bin/bazel \
            "https://github.com/bazelbuild/bazelisk/releases/download/${BAZELISK_VERSION}/bazelisk-linux-amd64"
          chmod +x /usr/local/bin/bazel
          bazel version
        env:
          BAZELISK_VERSION: "v1.29.0"

      - name: Check out repository
        uses: actions/checkout@v7

      # Do not `bazel run //api/v1:generate` here — that rewrites stubs and hides
      # drift. Codegen targets are tagged manual (BSR remotes); Native job checks
      # drift via `go tool buf generate`. Optionally: bazel test //api/v1:generate_tests

      - name: Build
        run: |
          bazel build //...

      - name: Test
        run: bazel test //...

  native:
    name: Native (Go, Python, Rust)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Download modules and install Go tools
        run: |
          set -euo pipefail
          go mod download
          go install tool

      - name: Lint Protobuf
        run: go tool buf lint --error-format=github-actions

      - name: Check generated code is up to date
        env:
          # Remote plugins need auth (~10/hr anonymous vs ~960/hr with token).
          # Repo secret: BUF_TOKEN from https://buf.build/settings/user
          BUF_TOKEN: ${{ secrets.BUF_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${BUF_TOKEN}" ]]; then
            echo "::error::BUF_TOKEN secret is required for BSR remote codegen. Create a token at https://buf.build/settings/user and add it as a repository secret."
            exit 1
          fi
          go tool buf generate --template buf.gen.go.yaml
          go tool buf generate --template buf.gen.python.yaml --include-imports
          go tool buf generate --template buf.gen.rust.yaml
          # Match bazel buf_generate: py plugins omit package markers.
          find python/gen -type d -print0 | while IFS= read -r -d "" d; do
            if [[ ! -f "$d/__init__.py" ]]; then
              printf '%s\n' 'from __future__ import annotations' > "$d/__init__.py"
            fi
          done
          if ! git diff --exit-code -- go/api; then
            echo "::error::Generated Go code is out of date. Run 'go tool buf generate --template buf.gen.go.yaml' (or 'bazel run //api/v1:generate') and commit the result."
            exit 1
          fi
          if ! git diff --exit-code -- python/gen; then
            echo "::error::Generated Python code is out of date. Run 'go tool buf generate --template buf.gen.python.yaml --include-imports' (or 'bazel run //api/v1:generate') and commit the result."
            exit 1
          fi
          if ! git diff --exit-code -- rust/api/gen; then
            echo "::error::Generated Rust code is out of date. Run 'go tool buf generate --template buf.gen.rust.yaml' (or 'bazel run //api/v1:generate') and commit the result."
            exit 1
          fi

      - name: Build
        run: go build ./...

      - name: Build and lint Rust
        run: |
          set -euo pipefail
          cargo clippy --locked -- -D warnings
          cargo test --locked -p echo-server

      - name: Lint Go
        run: go tool golangci-lint run --issues-exit-code=1 ./...

      - name: Lint Python
        run: |
          set -euo pipefail
          python -m pip install -r requirements-dev.txt
          ruff check python
          ruff format --check python/echo

      - name: Vulnerability check
        run: |
          set -euo pipefail
          go tool govulncheck ./...
          pip-audit -r requirements.txt -r requirements-dev.txt

      - name: Test
        run: go test ./...

  agent-maintain:
    name: Agent maintain (main)
    # Issues/reconcile against default branch only — avoid PR-branch noise.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    permissions:
      contents: write
      pull-requests: write
      issues: write
    env:
      CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
      AGENT_MAINTAIN_MODEL: ${{ vars.AGENT_MAINTAIN_MODEL || vars.CURSOR_AGENT_MODEL || vars.CURSOR_DEP_MODEL || vars.CURSOR_REV_MODEL || vars.CURSOR_VUL_MODEL }}
      AGENT_SCM: github
      GH_TOKEN: ${{ github.token }}
      BUF_TOKEN: ${{ secrets.BUF_TOKEN }}
      GIT_AUTHOR_NAME: agent
      GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
      GIT_COMMITTER_NAME: agent
      GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
    steps:
      - name: Check secrets and vars
        run: |
          set -euo pipefail
          if [ -z "${CURSOR_API_KEY:-}" ]; then
            echo "::error::Missing secret CURSOR_API_KEY"
            exit 1
          fi
          if [ -z "${AGENT_MAINTAIN_MODEL:-}" ]; then
            echo "::error::Missing variable AGENT_MAINTAIN_MODEL (or CURSOR_*_MODEL fallback)"
            exit 1
          fi
          echo "AGENT_MAINTAIN_MODEL=$AGENT_MAINTAIN_MODEL"

      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: true
          fetch-depth: 0
          token: ${{ secrets.AGENT_WORKFLOW_TOKEN || github.token }}

      - name: Configure git
        run: |
          set -euo pipefail
          git config user.name "$GIT_AUTHOR_NAME"
          git config user.email "$GIT_AUTHOR_EMAIL"

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Download modules and install Go tools
        run: |
          set -euo pipefail
          go mod download
          go install tool

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      - name: Install agent runner
        env:
          RUNNER_REF: ${{ vars.AGENT_RUNNER_REF || 'v0.3.7' }}
        run: |
          set -euo pipefail
          git clone --depth 1 --branch "$RUNNER_REF" \
            https://github.com/amsokol/ai-devsecops-cursor.git \
            "${{ runner.temp }}/ai-devsecops-cursor"
          cd "${{ runner.temp }}/ai-devsecops-cursor"
          uv sync --frozen

      - name: Agent-maintain ship
        working-directory: ${{ runner.temp }}/ai-devsecops-cursor
        env:
          TARGET_PATH: ${{ github.workspace }}
          TARGET_ID: connect-examples
        run: uv run agent-maintain
