name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-lint-test:
    name: Build, lint, test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Buf
        uses: bufbuild/buf-action@v1.4.0
        with:
          setup_only: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Download modules
        run: go mod download

      - name: Lint Protobuf
        run: buf lint --error-format=github-actions

      - name: Check generated code is up to date
        run: |
          set -euo pipefail
          buf generate --template buf.gen.go.yaml
          buf generate --template buf.gen.python.yaml --include-imports
          if ! git diff --exit-code -- go/api; then
            echo "::error::Generated Go code is out of date. Run 'buf generate --template buf.gen.go.yaml' and commit the result."
            exit 1
          fi
          if ! git diff --exit-code -- python/api python/buf python/__init__.py; then
            echo "::error::Generated Python code is out of date. Run 'buf generate --template buf.gen.python.yaml --include-imports' and commit the result."
            exit 1
          fi

      - name: Build
        run: go build ./...

      - name: Lint Go
        run: go tool golangci-lint run --issues-exit-code=1 ./...

      - name: Lint Python
        run: |
          set -euo pipefail
          python -m pip install -r requirements-dev.txt
          ruff check python
          ruff format --check python/echo

      - name: Vulnerability check
        run: |
          set -euo pipefail
          go tool govulncheck ./...
          pip-audit -r requirements.txt -r requirements-dev.txt

      - name: Test
        run: go test ./...
