# Renovate GitHub App cannot run postUpgradeTasks. When a Renovate PR bumps
# buf.yaml module pins, refresh buf.lock on the same branch.
name: Renovate buf.lock

on:
  pull_request:
    paths:
      - buf.yaml

permissions:
  contents: write

jobs:
  update-buf-lock:
    name: buf dep update
    if: startsWith(github.head_ref, 'renovate/')
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR branch
        uses: actions/checkout@v7.0.1
        with:
          ref: ${{ github.head_ref }}
          # Need a token that can push to the Renovate branch.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Go tools (buf)
        run: |
          set -euo pipefail
          go mod download
          go install tool

      - name: Refresh buf.lock
        run: go tool buf dep update

      - name: Commit buf.lock if changed
        uses: stefanzweifel/git-auto-commit-action@v7.2.0
        with:
          commit_message: "chore(buf): refresh buf.lock after dep pin bump"
          file_pattern: buf.lock
          commit_user_name: github-actions[bot]
          commit_user_email: 41898282+github-actions[bot]@users.noreply.github.com
